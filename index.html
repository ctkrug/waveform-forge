<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waveform Forge</title>
    <meta
      name="description"
      content="Drop an audio file and get an instant waveform + spectrogram, trim it, and export to MP3/AAC/WAV — entirely in your browser."
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header class="topbar">
        <h1 class="wordmark" data-wordmark aria-label="Waveform Forge">
          <span>WAVEFORM FORGE</span>
        </h1>
        <div class="file-meta">
          <span class="file-name" data-file-name>NO SIGNAL</span>
          <span class="file-duration" data-file-duration></span>
          <span class="file-tech" data-file-tech></span>
          <button class="btn btn-ghost" data-load-new type="button" hidden>
            Load new file
          </button>
        </div>
      </header>

      <main class="scope-panel" data-scope-panel>
        <div
          class="dropzone"
          data-dropzone
          tabindex="0"
          role="button"
          aria-label="Drop an audio file, or press to choose one"
        >
          <p class="dropzone-title" data-dropzone-title>NO SIGNAL &mdash; DROP A FILE</p>
          <p class="dropzone-hint">
            or click to choose &mdash; MP3, WAV, AAC, FLAC, OGG, M4A
          </p>
          <input
            type="file"
            accept="audio/*"
            data-file-input
            class="visually-hidden"
            aria-hidden="true"
            tabindex="-1"
          />
        </div>

        <div class="scope-stack" data-scope-stack hidden>
          <div
            class="canvas-wrap waveform-wrap"
            data-waveform-wrap
            tabindex="0"
            role="group"
            aria-label="Waveform zoom and pan — use +/- to zoom, 0 to reset"
          >
            <canvas data-waveform-canvas></canvas>
            <div
              class="trim-handle trim-handle-start"
              data-trim-start
              tabindex="0"
              role="slider"
              aria-label="Trim start"
              aria-valuemin="0"
              aria-valuemax="0"
              aria-valuenow="0"
            ></div>
            <div class="trim-region" data-trim-region></div>
            <div
              class="trim-handle trim-handle-end"
              data-trim-end
              tabindex="0"
              role="slider"
              aria-label="Trim end"
              aria-valuemin="0"
              aria-valuemax="0"
              aria-valuenow="0"
            ></div>
            <div class="playhead" data-playhead></div>
          </div>
          <div class="canvas-wrap spectrogram-wrap">
            <canvas data-spectrogram-canvas></canvas>
            <div class="playhead" data-spectrogram-playhead></div>
          </div>
        </div>

        <p class="status-line" role="status" aria-live="polite" data-status-line></p>
      </main>

      <footer class="transport" data-transport hidden>
        <button class="btn btn-icon" data-play-toggle type="button" aria-label="Play">
          <span data-play-icon aria-hidden="true">&#9658;</span>
        </button>
        <button
          class="btn btn-icon"
          data-loop-toggle
          type="button"
          aria-label="Loop trim selection"
          aria-pressed="false"
        >
          <span aria-hidden="true">&#8635;</span>
        </button>
        <div
          class="level-meter"
          data-level-meter
          role="meter"
          aria-label="Playback level"
          aria-valuemin="-60"
          aria-valuemax="0"
          aria-valuenow="-60"
        >
          <div class="level-meter-track">
            <div class="level-meter-fill" data-level-meter-fill></div>
          </div>
          <span class="level-meter-clip" data-level-meter-clip aria-hidden="true"
            >CLIP</span
          >
        </div>
        <span class="time-readout" data-time-readout>00:00.000 / 00:00.000</span>
        <span class="trim-readout" data-trim-readout>trim 00:00.000&ndash;00:00.000</span>
        <label class="field">
          <span class="field-label">FFT</span>
          <select class="select" data-fft-size-select aria-label="Spectrogram FFT size">
            <option value="512">512</option>
            <option value="1024" selected>1024</option>
            <option value="2048">2048</option>
            <option value="4096">4096</option>
          </select>
        </label>
        <label class="field">
          <span class="field-label">Format</span>
          <select class="select" data-format-select aria-label="Export format">
            <option value="mp3">MP3</option>
            <option value="aac">AAC</option>
            <option value="wav">WAV</option>
          </select>
        </label>
        <button class="btn btn-primary" data-export-button type="button">Export</button>
        <div class="export-progress" data-export-progress hidden>
          <div class="export-progress-bar" data-export-progress-bar></div>
        </div>
        <a class="btn btn-primary visually-hidden" data-download-link href="#" download
          >Download</a
        >
      </footer>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
